server {
    listen 8080;
    server_name localhost;
    client_max_body_size 10M;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        # Only fallback to index.html for non-asset paths (SPA routing)
        try_files $uri $uri/ /index.html;
    }

    # Don't serve index.html for missing static assets (images, fonts, manifests, etc)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webmanifest|json)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
