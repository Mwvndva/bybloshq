services:
  - type: web
    name: byblos-atelier-api
    runtime: node
    buildCommand: npm run build
    preDeployCommand: npm run migrate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        fromDatabase:
          name: byblos
          property: hostname
      - key: DB_PORT
        fromDatabase:
          name: byblos
          property: port
      - key: DB_NAME
        fromDatabase:
          name: byblos
          property: database
      - key: DB_USER
        fromDatabase:
          name: byblos
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: byblos
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
    # Free plan suspends after 15 min of inactivity. Upgrade to `standard` (or
    # higher) for production traffic — change requires billing approval.
    plan: free
