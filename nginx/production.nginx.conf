events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Basic Settings
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip Compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.geo+json
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/plain
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # 1. HTTP to HTTPS Redirect
    server {
        listen 80;
        server_name bybloshq.space www.bybloshq.space api.bybloshq.space;

        # Let's Encrypt ACME HTTP-01 challenge. MUST be served over plain HTTP and
        # matched BEFORE the HTTPS redirect so `certbot --webroot` can renew the
        # certificate without stopping nginx or freeing port 80. This is the fix
        # for the silent auto-renewal failure that caused NET::ERR_CERT_DATE_INVALID.
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 2. Main Site (Frontend + API Proxy)
    server {
        listen 443 ssl http2;
        server_name bybloshq.space www.bybloshq.space;

        # SSL Certificates (consistent with Docker volume mapping)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Security Headers. CSP allows specific origins instead of the previous
        # blanket "http: https: 'unsafe-inline'". The two SHA-256 hashes
        # whitelist the inline application/ld+json structured-data blocks in
        # index.html; regenerate them if those JSON-LD blocks ever change.
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.googletagmanager.com 'sha256-NaJZlU/s/OZA6/AMrpaZwaKS8UN1Xc1QnxfbqntIRsU=' 'sha256-hKIufYiXmu5pPvzY7tVFxhT31LCG9/CXlYd73VcwcUA='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://res.cloudinary.com https://www.google-analytics.com https://www.googletagmanager.com https://tile.openstreetmap.org https://*.tile.openstreetmap.org https://tile.openstreetmap.fr https://*.basemaps.cartocdn.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://www.google-analytics.com https://www.googletagmanager.com https://api.bybloshq.space; frame-ancestors 'self'; base-uri 'self'; form-action 'self';";

        # Root directory for static files (uncomment if serving directly on VPS)
        # root /var/www/bybloshq/dist;
        # index index.html;

        # Frontend SPA Routing (handled by frontend container)
        location / {
            proxy_pass http://frontend:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API Proxy
        location /api {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_read_timeout 600s;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            
            client_max_body_size 500M;
        }

        # Paid digital products must stay behind the authenticated API download route.
        location ^~ /uploads/digital_products {
            return 404;
        }

        # Handle public uploads directly via Nginx for speed
        location /uploads {
            alias /app/uploads;
            expires 1d;
            add_header Cache-Control "public";
        }
    }

    # 3. Dedicated API Subdomain (Optional, proxied to same backend)
    server {
        listen 443 ssl http2;
        server_name api.bybloshq.space;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        location / {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            # ... identical proxy settings as above
        }
    }
    # Memory App API Route
    server {
        listen 80;
        server_name api.mymemoriestoday.site;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name api.mymemoriestoday.site;

        ssl_certificate /etc/letsencrypt/live/api.mymemoriestoday.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.mymemoriestoday.site/privkey.pem;

        location / {
            # 172.17.0.1 is the default Docker bridge IP to reach your host's PM2 apps
            proxy_pass http://172.17.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }

}
