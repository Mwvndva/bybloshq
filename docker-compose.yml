services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: byblos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-bybloshqdb}
      POSTGRES_USER: ${DB_USER:-byblos_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/migrations:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - byblos-network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: byblos-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - byblos-network

  # Backend API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: byblos-backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_NAME: ${APP_NAME:-Byblos}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-bybloshqdb}
      DB_USER: ${DB_USER:-byblos_user}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: "false"
      REDIS_URL: redis://redis:6379

      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}

      PAYD_USERNAME: ${PAYD_USERNAME}
      PAYD_PASSWORD: ${PAYD_PASSWORD}
      PAYD_NETWORK_CODE: ${PAYD_NETWORK_CODE}
      PAYD_CHANNEL_ID: ${PAYD_CHANNEL_ID}

      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}

      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_SECURE: ${EMAIL_SECURE}
      EMAIL_USERNAME: ${EMAIL_USERNAME}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_FROM_EMAIL: ${EMAIL_FROM_EMAIL}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
      EMAIL_VERIFICATION_EXPIRES_HOURS: ${EMAIL_VERIFICATION_EXPIRES_HOURS}

      PAYD_CALLBACK_URL: ${PAYD_CALLBACK_URL}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    depends_on:
      - postgres
      - redis
    # ports:
    #   - "3002:3002"
    volumes:
      - ./server/uploads:/app/uploads
      - baileys_auth:/app/baileys_auth_info
    networks:
      - byblos-network

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: byblos-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${FRONTEND_API_URL:-/api}
    # ports:
    #   - "80:80"
    depends_on:

      - backend
    networks:
      - byblos-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: byblos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - byblos-network

volumes:
  postgres_data:
  redis_data:
  baileys_auth:


networks:
  byblos-network:
    driver: bridge
