<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'Plus Jakarta Sans';
    src: local('Plus Jakarta Sans');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1920px;
    background: #000000;
    font-family: 'Plus Jakarta Sans', 'DM Sans', Arial, sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* subtle staged background glow */
  .glow {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 1400px;
    height: 1400px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(245,197,24,0.10) 0%, rgba(245,197,24,0.0) 60%);
  }

  .texture {
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(120deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 80px);
  }

  .stage {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    position: relative;
    width: 900px;
    height: 566px;
    background: linear-gradient(155deg, #141310 0%, #0a0a09 55%, #000000 100%);
    border-radius: 34px;
    border: 1px solid rgba(245,197,24,0.35);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03) inset,
      0 40px 80px rgba(0,0,0,0.6);
    padding: 48px 56px;
    overflow: hidden;
  }

  .watermark {
    position: absolute;
    top: 24px;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    height: calc(100% - 48px);
    width: auto;
    opacity: 0.05;
    filter: grayscale(1) brightness(3);
    pointer-events: none;
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 100%;
  }

  .top-row {
    position: relative;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .logo-mark {
    height: 44px;
    width: auto;
    display: block;
  }

  .member-number {
    text-align: right;
  }
  .member-number .num {
    font-size: 22px;
    letter-spacing: 0.08em;
    color: #f5c518;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .title-row {
    text-align: center;
    margin-top: 14px;
  }
  .founder-label {
    display: inline-block;
    font-size: 13px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #f5c518;
    font-weight: 600;
  }

  .quote-zone {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    gap: 18px;
  }
  .quote {
    text-align: center;
    color: #faf9f5;
    font-size: 40px;
    line-height: 1.28;
    font-weight: 500;
    letter-spacing: -0.01em;
    white-space: nowrap;
  }
  .caption {
    text-align: center;
    color: rgba(250,249,245,0.58);
    font-size: 16px;
    line-height: 1.4;
    font-weight: 400;
    max-width: 480px;
  }

  .footer-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .footer-row .ig-icon {
    width: 15px;
    height: 15px;
    opacity: 0.55;
  }
  .footer-row .handle {
    font-size: 14px;
    letter-spacing: 0.04em;
    color: rgba(250,249,245,0.55);
    font-weight: 500;
  }
</style>
</head>
